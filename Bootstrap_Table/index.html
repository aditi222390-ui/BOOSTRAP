<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Table</title>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">
        Student Information
    </h2>

    <div class="table-responsive">

        <table class="table table-bordered table-striped table-hover align-middle text-center w-75 mx-auto">

            <caption class="caption-top">
                Student Details Table
            </caption>

            <thead class="table-dark">
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Year</th>
                    <th>Percentage</th>
                </tr>
            </thead>

            <tbody>

                <tr class="table-primary">
                    <td>101</td>
                    <td>Anushka</td>
                    <td>Computer</td>
                    <td>3rd</td>
                    <td>85%</td>
                </tr>

                <tr class="table-success">
                    <td>102</td>
                    <td>Rahul</td>
                    <td>IT</td>
                    <td>3rd</td>
                    <td>82%</td>
                </tr>

                <tr class="table-warning">
                    <td>103</td>
                    <td>Priya</td>
                    <td>Mechanical</td>
                    <td>2nd</td>
                    <td>78%</td>
                </tr>

                <tr class="table-danger">
                    <td>104</td>
                    <td>Amit</td>
                    <td>Electronics</td>
                    <td>3rd</td>
                    <td>91%</td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
