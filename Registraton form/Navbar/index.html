<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Header & Hero</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<!-- Header -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-bootstrap-fill"></i> My Website
        </a>

        <ul class="navbar-nav ms-auto d-flex flex-row">
            <li class="nav-item mx-2">
                <a class="nav-link active" href="#">Home</a>
            </li>

            <li class="nav-item mx-2">
                <a class="nav-link" href="#">About</a>
            </li>

            <li class="nav-item mx-2">
                <a class="nav-link" href="#">Services</a>
            </li>

            <li class="nav-item mx-2">
                <a class="nav-link" href="#">Contact</a>
            </li>
        </ul>

        <button class="btn btn-primary ms-3">
            Login
        </button>

    </div>
</nav>

<!-- Hero Section -->
<section class="bg-light py-5">
    <div class="container">
        <div class="row align-items-center">

            <!-- Left Side -->
            <div class="col-md-6">

                <span class="badge bg-primary mb-3">
                    Welcome
                </span>

                <h1 class="display-4 fw-bold">
                    Learn Bootstrap
                </h1>

                <p class="lead text-muted">
                    Build responsive websites using Bootstrap 5 easily.
                </p>

                <a href="#" class="btn btn-primary btn-lg me-2">
                    Get Started
                </a>

                <a href="#" class="btn btn-outline-dark btn-lg">
                    Learn More
                </a>

            </div>

            <!-- Right Side -->
            <div class="col-md-6 mt-4 mt-md-0">

                <div class="card shadow border-0">

                    <img src="https://picsum.photos/600/400"
                         class="card-img-top"
                         alt="Image">

                    <div class="card-body text-center">

                        <h4 class="card-title">
                            Bootstrap Card
                        </h4>

                        <p class="card-text">
                            Create beautiful and responsive web pages.
                        </p>

                        <a href="#" class="btn btn-success">
                            Explore
                        </a>

                    </div>

                </div>

            </div>

        </div>
    </div>
</section>

</body>
</html>
